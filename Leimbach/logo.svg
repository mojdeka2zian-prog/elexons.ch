<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;display=swap');
      .brand { font-family: 'Montserrat', 'Arial Black', sans-serif; font-weight: 800; }
      .sub   { font-family: 'Montserrat', 'Arial', sans-serif; font-weight: 400; }
    </style>
  </defs>

  <!-- ELEX -->
  <text class="brand" x="0" y="68" font-size="64" fill="#f5f0e8" letter-spacing="1">ELEX</text>

  <!-- O as house icon (positioned where O would be) -->
  <g transform="translate(225, 5)">
    <!-- Outer rounded square -->
    <rect x="0" y="0" width="56" height="56" rx="6" fill="none" stroke="#f5f0e8" stroke-width="4"/>
    <!-- Roof (triangle) -->
    <polygon points="28,10 8,30 48,30" fill="#f5f0e8"/>
    <!-- Wall -->
    <rect x="13" y="30" width="30" height="18" fill="#f5f0e8"/>
    <!-- Door cutout -->
    <rect x="21" y="37" width="14" height="11" fill="#0a0a0a"/>
  </g>

  <!-- NS -->
  <text class="brand" x="289" y="68" font-size="64" fill="#f5f0e8" letter-spacing="1">NS</text>

  <!-- SMART HOME -->
  <text class="sub" x="190" y="96" font-size="12" fill="#c8c0b0" letter-spacing="9" text-anchor="middle">SMART HOME</text>
</svg>
